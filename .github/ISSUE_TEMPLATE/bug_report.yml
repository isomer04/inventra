name: Bug Report
description: Report a bug or unexpected behaviour in Inventra
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Security vulnerability?** Please use the [private disclosure process](../SECURITY.md) instead of this form.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behaviour.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behaviour
      description: What actually happened. Include error messages, screenshots, or logs.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Branch
      placeholder: e.g. main, 1.0.0-rc.1
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 15 / Windows 11 / Ubuntu 24.04
        Browser: Chrome 125 / Firefox 127
        Deployment: Docker Compose / local dev
    validations:
      required: false
