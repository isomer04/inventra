<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Inventra - Inventory & Order Management</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Inventra - Modern inventory and order management system" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <!-- Fonts and icons are self-hosted via npm packages — no external CDN calls -->
  </head>
  <body>
    <app-root>
      <!-- Loading indicator while Angular bootstraps -->
      <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column;">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
          <span class="visually-hidden">Loading application...</span>
        </div>
        <p style="margin-top: 1rem; color: #6c757d;">Loading Inventra...</p>
      </div>
    </app-root>
  </body>
</html>
