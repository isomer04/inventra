<div class="timeline">
  @for (entry of history(); track entry.id; let isLast = $last) {
    <div class="timeline-item">
      <div class="timeline-marker">
        <i class="bi" [ngClass]="getStatusIcon(entry.toStatus)"></i>
      </div>
      <div class="timeline-content">
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            @if (entry.fromStatus) {
              <span class="badge" [ngClass]="getStatusBadgeClass(entry.fromStatus)">
                {{ entry.fromStatus }}
              </span>
              <i class="bi bi-arrow-right mx-2"></i>
            }
            <span class="badge" [ngClass]="getStatusBadgeClass(entry.toStatus)">
              {{ entry.toStatus }}
            </span>
          </div>
          <small class="text-muted">
            {{ entry.changedAt | date:'short' }}
          </small>
        </div>
        @if (entry.notes) {
          <div class="text-muted small">
            <i class="bi bi-chat-left-text"></i>
            {{ entry.notes }}
          </div>
        }
      </div>
      @if (!isLast) {
        <div class="timeline-line"></div>
      }
    </div>
  }
</div>

@if (history().length === 0) {
  <div class="text-center text-muted py-3">
    <i class="bi bi-clock-history"></i>
    No status history available
  </div>
}
