<!-- Backdrop — click closes the dialog -->
<div
  class="dialog-backdrop"
  role="presentation"
  (click)="cancelled.emit()">
</div>

<!-- Dialog — Escape key handler lives here where focus actually is -->
<div
  class="dialog"
  role="alertdialog"
  aria-modal="true"
  [attr.aria-labelledby]="'dialog-title'"
  [attr.aria-describedby]="'dialog-message'"
  (keydown.escape)="cancelled.emit()">

  <div class="dialog__header">
    <h2 id="dialog-title" class="dialog__title">{{ title() }}</h2>
  </div>

  <div class="dialog__body">
    <p id="dialog-message" class="dialog__message">{{ message() }}</p>
  </div>

  <div class="dialog__footer">
    <button
      type="button"
      class="btn-outline dialog__btn"
      (click)="cancelled.emit()">
      {{ cancelLabel() }}
    </button>
    <!-- #confirmBtn used by viewChild() to receive focus on open -->
    <button
      #confirmBtn
      type="button"
      class="btn-accent dialog__btn"
      [class.btn-danger]="danger()"
      (click)="confirmed.emit()">
      {{ confirmLabel() }}
    </button>
  </div>

</div>
