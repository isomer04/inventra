# Production nginx config — TLS-first design.
#
# This file is processed by docker-entrypoint.sh at container startup.
# The entrypoint checks whether /etc/ssl/inventra/cert.pem exists:
#
#   cert present  → HTTPS server (port 8443) + HTTP→HTTPS redirect (port 8080)
#   cert absent   → HTTP-only server (port 8080) with a loud startup warning
#
# To activate HTTPS:
#   1. Obtain a certificate:
#        certbot certonly --standalone -d yourdomain.com
#      or generate a self-signed cert for local/staging testing:
#        ./scripts/gen-self-signed-cert.sh
#   2. Place cert.pem + key.pem in /etc/ssl/inventra/ on the host.
#   3. Ensure the cert volume is mounted in docker-compose.prod.yml (already configured).
#   4. Restart the frontend container: docker compose restart frontend
#   5. After confirming HTTPS works, submit to https://hstspreload.org
#
# No manual file editing required — the entrypoint handles the switch automatically.

# Active only when TLS is enabled (cert present). Redirects all plain-HTTP
# traffic to HTTPS with a permanent 301.
server {
    listen 8080;
    server_name _;

    # Reject oversized bodies even on the redirect server
    client_max_body_size 2m;

    # Fail closed while restore.sh drains writers and validates the restored DB.
    if (-f /var/run/inventra/maintenance) { return 503; }

    # When TLS is active this block only serves redirects — no content.
    # When TLS is inactive this block is replaced by the HTTP-only block below
    # via the entrypoint script.
    return 301 https://$host$request_uri;
}

server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/inventra/cert.pem;
    ssl_certificate_key /etc/ssl/inventra/key.pem;

    # Modern TLS only — drop TLS 1.0/1.1
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # Session resumption — reduces handshake overhead for returning clients
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling — lets nginx cache the CA's revocation response
    ssl_stapling        on;
    ssl_stapling_verify on;

    root  /usr/share/nginx/html;
    index index.html;

    # Limit request body size at the nginx layer
    client_max_body_size 2m;

    # Fail closed while restore.sh drains writers and validates the restored DB.
    if (-f /var/run/inventra/maintenance) { return 503; }

    include /etc/nginx/conf.d/security-headers.conf;

    location ~* "\.[0-9a-f]{8,}\.(js|css|woff2?)$" {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/auth/ {
        include /etc/nginx/conf.d/security-headers.conf;
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
