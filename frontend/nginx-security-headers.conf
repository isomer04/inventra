# Security headers — included in every location block where they should apply.
#
# Why this is a separate file:
# nginx's `add_header` inheritance is brittle: if a location block defines ANY
# `add_header`, it suppresses ALL inherited headers from the parent (server)
# block. Including this file in every location guarantees the headers are
# attached regardless of what other `add_header` directives the location adds.

# Prevent the app from being embedded in a frame on other origins
add_header X-Frame-Options "DENY" always;

# Stop browsers from MIME-sniffing the content type
add_header X-Content-Type-Options "nosniff" always;

# Only send the origin as the Referer header, never the full path
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Disable browser features not used by the app
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content Security Policy — inline styles are required for Angular
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none';" always;

# Force HTTPS once you have a valid TLS certificate. Setting this on plain HTTP
# can lock users out, so enable this only after TLS is confirmed working.
# Added 'preload' directive for HSTS preload list eligibility.
# Submit to https://hstspreload.org after TLS is confirmed working in production.
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
