# nginx-http-only.conf — HTTP-only fallback used by docker-entrypoint.sh
# when no TLS certificate is found at /etc/ssl/inventra/cert.pem.
#
# WARNING: This mode transmits all data — including JWTs and PII — in plaintext.
# It is suitable for local development and staging only.
# DO NOT use this in production without TLS.
#
# This file is copied to /etc/nginx/conf.d/default.conf by docker-entrypoint.sh
# when TLS is not available. It is NOT used directly by Docker.

server {
    listen 8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Limit request body size at the nginx layer
    client_max_body_size 2m;

    # Fail closed while restore.sh drains writers and validates the restored DB.
    if (-f /var/run/inventra/maintenance) { return 503; }

    include /etc/nginx/conf.d/security-headers.conf;

    location ~* "\.[0-9a-f]{8,}\.(js|css|woff2?)$" {
        include /etc/nginx/conf.d/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location = /index.html {
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires 0;
    }

    location / {
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/auth/ {
        include /etc/nginx/conf.d/security-headers.conf;
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        include /etc/nginx/conf.d/security-headers.conf;
        proxy_pass http://app:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
