# Rate limit zone for auth endpoints — must be defined at http{} level.
# Copied to /etc/nginx/conf.d/ which the unprivileged image includes from http{}.
#
# 10 MB tracks ~160k unique IPs. Rate is the sustained allowance;
# burst (set in nginx.conf) is the short-window allowance.
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=20r/m;
